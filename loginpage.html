<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EAP System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 900px;
            display: flex;
            min-height: 550px;
        }

        /* Branding Side */
        .login-brand {
            background: linear-gradient(135deg, #0d6efd 0%, #0043a8 100%);
            color: white;
            padding: 50px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .login-brand::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('https://www.transparenttextures.com/patterns/cubes.png');
            opacity: 0.1;
        }

        .brand-logo {
            font-size: 3rem;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .login-logo-img {
    width: 150px;         /* Adjust this number to make it smaller or larger */
    height: auto;        /* Maintains aspect ratio */
    margin-bottom: 5px;
    filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.2)); /* Optional: adds depth */
}

        /* Form Side */
        .login-form-area {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            background-color: #f8f9fa;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
            border-color: #0d6efd;
        }

        .btn-login {
            background: #0d6efd;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
        }

        .social-login {
            text-align: center;
            margin-top: 25px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        @media (max-width: 768px) {
            .login-brand { display: none; }
            .login-container { max-width: 450px; }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-brand">
        <img src="https://midi.unikl.edu.my/wp-content/uploads/2021/07/unikl-logo-png-new.png" alt="UniKL Logo" class="login-logo-img">
        <h2 class="fw-bold">EAP System</h2>
        <p class="opacity-75">External Academic Panel Management. Streamlined verification and academic oversight portal.</p>
        <div class="mt-4">
            <div class="d-flex align-items-center mb-2 small opacity-75">
                <i class="fas fa-check-circle me-2"></i> Verified Academic Profiles
            </div>
            <div class="d-flex align-items-center mb-2 small opacity-75">
                <i class="fas fa-check-circle me-2"></i> Quality Assurance Integration
            </div>
        </div>
    </div>

    <div class="login-form-area">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark">Welcome Back</h3>
            <p class="text-muted small">Please enter your credentials to continue</p>
        </div>

        <form action="login.php" method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" class="form-control border-start-0" placeholder="Enter username" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold text-muted">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control border-start-0" placeholder="Enter password" required>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label small text-muted" for="remember">Remember me</label>
                </div>
                <a href="#" class="small text-decoration-none">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary btn-login w-100 mb-3">
                Sign In <i class="fas fa-arrow-right ms-2"></i>
            </button>
        </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
